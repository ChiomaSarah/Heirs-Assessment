<div class="container">
  <div style="padding-top: 8rem">
    <!-- Display spinner while data is being fetched -->
    <div *ngIf="isLoading">
      <app-loader />
    </div>

    <!-- Filter bar -->
    <div *ngIf="!isLoading">
      <input matInput (keyup)="applyFilter($event)" type="text" placeholder="Enter Search Term..." />
    </div>

    <!-- table -->
    <div class="mat-elevation-z8">
      <table mat-table [dataSource]="dataSource" matSort *ngIf="!isLoading">
        <!-- ID Column -->
        <ng-container matColumnDef="id">
          <th mat-header-cell *matHeaderCellDef mat-sort-header><b>ID</b></th>
          <td mat-cell *matCellDef="let row">{{ row.id }}</td>
        </ng-container>

        <!-- Avatar Column -->
        <ng-container matColumnDef="avatar">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>
            <b>Avatar</b>
          </th>
          <td mat-cell *matCellDef="let row">
            <img mat-table-image [src]="row.avatar" class="avatar" alt="User's Avatar"
              onerror="this.src='https://via.placeholder.com/48?text=No+Image'" />
          </td>
        </ng-container>

        <!-- Firstname Column -->
        <ng-container matColumnDef="firstname">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>
            <b>Firstname</b>
          </th>
          <td mat-cell *matCellDef="let row">{{ row.firstname }}</td>
        </ng-container>

        <!-- Lastname Column -->
        <ng-container matColumnDef="lastname">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>
            <b>Lastname</b>
          </th>
          <td mat-cell *matCellDef="let row">{{ row.lastname }}</td>
        </ng-container>

        <!-- Email Column -->
        <ng-container matColumnDef="email">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>
            <b>Email Address</b>
          </th>
          <td mat-cell *matCellDef="let row">{{ row.email }}</td>
        </ng-container>

        <!-- Social Insurance Number Column -->
        <ng-container matColumnDef="social_insurance_number">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>
            <b>Insurance ID</b>
          </th>
          <td mat-cell *matCellDef="let row">
            {{ row.social_insurance_number }}
          </td>
        </ng-container>

        <!-- Plan Column -->
        <ng-container matColumnDef="plan">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>
            <b>Plan</b>
          </th>
          <td mat-cell *matCellDef="let row">{{ row.plan }}</td>
        </ng-container>

        <!-- Status Column -->
        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>
            <b>Status</b>
          </th>
          <td mat-cell *matCellDef="let row">
            <span [class]="'status-badge status-' + row.status.toLowerCase()">
              {{ row.status }}
            </span>
          </td>
        </ng-container>

        <!-- Country Column -->
        <ng-container matColumnDef="country">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>
            <b>Country</b>
          </th>
          <td mat-cell *matCellDef="let row">{{ row.country }}</td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>

        <!-- Row shown when there is no matching data -->
        <tr class="mat-row" *matNoDataRow>
          <td class="mat-cell" colspan="9">
            No data matching the filter "{{ filterValue }}"
          </td>
        </tr>
      </table>

      <mat-paginator [pageSizeOptions]="[5, 10, 25, 100]" aria-label="Select page of users">
      </mat-paginator>
    </div>
  </div>
</div>
